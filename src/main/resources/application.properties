# Habilitar CORS
quarkus.http.cors.enabled=true

# Origens permitidas (separe por vĒrgula para m·ltiplas origens)
quarkus.http.cors.origins=*

# Mķtodos HTTP permitidos
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS

# Headers permitidos
quarkus.http.cors.headers=Content-Type,Authorization,User-Agent,Accept,Origin

# Expor cabeńalhos especĒficos para o cliente
quarkus.http.cors.exposed-headers=Content-Disposition

# Tempo (em segundos) que as informań§es de preflight devem ser armazenadas em cache
quarkus.http.cors.access-control-max-age=24H

# Permitir credenciais (cookies, cabeńalhos de autorizańŃo)
quarkus.http.cors.access-control-allow-credentials=true