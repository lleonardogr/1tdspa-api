# Habilitar CORS
quarkus.http.cors.enabled=true

# Origens permitidas (separe por vírgula para múltiplas origens)
quarkus.http.cors.origins=*

# Métodos HTTP permitidos
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS

# Headers permitidos
quarkus.http.cors.headers=Content-Type,Authorization,User-Agent,Accept,Origin

# Expor cabeçalhos específicos para o cliente
quarkus.http.cors.exposed-headers=Content-Disposition

# Tempo (em segundos) que as informaçőes de preflight devem ser armazenadas em cache
quarkus.http.cors.access-control-max-age=24H

# Permitir credenciais (cookies, cabeçalhos de autorizaçăo)
quarkus.http.cors.access-control-allow-credentials=true

